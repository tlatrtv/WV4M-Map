const dark=matchMedia('(prefers-color-scheme: dark)').matches;
const mapBg=dark?'#1b2840':'#d4e6f1';
const stFill=dark?'#253650':'#eaf2f8';
const stStr=dark?'rgba(255,255,255,0.14)':'#b8cfe0';
const outStr=dark?'rgba(255,255,255,0.28)':'#88b4d0';
const labelCol=dark?'rgba(255,255,255,0.92)':'rgba(0,0,0,0.86)';
const haloCol=dark?'rgba(27,40,64,0.97)':'rgba(234,242,248,0.97)';

document.getElementById('map-svg').style.background=mapBg;

const svg=d3.select('#map-svg');
const proj=d3.geoAlbersUsa().scale(1180).translate([480,300]);
const geoPath=d3.geoPath().projection(proj);

// MAX_R halved from previous 22 → 11, cap at 2M
const POP_CAP=2000000;
const MAX_R=11;
const MIN_R=6;
const rSc=d3.scalePow().exponent(0.5).domain([0,POP_CAP]).range([0,MAX_R]);
function getR(pop){ return Math.min(MAX_R, Math.max(MIN_R, rSc(pop))); }

const tip=document.getElementById('tip');
const holder=document.getElementById('map-holder');
function showTip(ev,d){
  const rect=holder.getBoundingClientRect();
  let x=ev.clientX-rect.left+14, y=ev.clientY-rect.top-50;
  if(x+210>rect.width) x=ev.clientX-rect.left-218;
  if(y<0) y=ev.clientY-rect.top+12;
  tip.style.left=x+'px'; tip.style.top=y+'px'; tip.style.display='block';
  tip.innerHTML=`<strong>${d.n}, ${d.s}</strong><br/><span style="color:#aaa">${d.acp}</span><br/>Pop: ${d.pop.toLocaleString()}`;
}

Object.entries(COLORS).forEach(([type,col])=>{
  const el=document.createElement('div');
  el.className='li';
  el.innerHTML=`<div class="ld" style="background:${col}"></div><span>${type}</span>`;
  document.getElementById('aleg').appendChild(el);
});

const szsvg=d3.select('#szsvg');
const szPops=[5000,100000,500000,2000000];
const szLbls=['5K','100K','500K','2M+'];
let xo=MIN_R+2;
szPops.forEach((p,i)=>{
  const r=getR(p);
  szsvg.append('circle').attr('cx',xo).attr('cy',24).attr('r',r)
    .attr('fill','#888').attr('fill-opacity',0.7)
    .attr('stroke',dark?'rgba(255,255,255,0.4)':'#fff').attr('stroke-width',1);
  szsvg.append('text').attr('x',xo).attr('y',50).attr('text-anchor','middle')
    .attr('font-size',9).attr('fill',dark?'#aaa':'#666').text(szLbls[i]);
  xo+=r*2+8;
});

const CH_W=5.5, LH=11;
function textBBox(tx,ty,anchor,w){
  if(anchor==='start') return {x1:tx,    y1:ty-LH, x2:tx+w,    y2:ty+2};
  if(anchor==='end')   return {x1:tx-w,  y1:ty-LH, x2:tx,      y2:ty+2};
                       return {x1:tx-w/2,y1:ty-LH, x2:tx+w/2,  y2:ty+2};
}
function circleHitsRect(cx,cy,cr,b){
  const nx=Math.max(b.x1,Math.min(cx,b.x2));
  const ny=Math.max(b.y1,Math.min(cy,b.y2));
  const dx=cx-nx, dy=cy-ny;
  return (dx*dx+dy*dy)<((cr+2)*(cr+2));
}
function candidates(px,py,r,w){
  const p=4;
  return [
    {dx:r+p,       dy:4,          anchor:'start'},
    {dx:-(r+p),    dy:4,          anchor:'end'},
    {dx:0,         dy:-(r+p),     anchor:'middle'},
    {dx:0,         dy:r+p+LH,     anchor:'middle'},
    {dx:r*0.7+p,   dy:-(r*0.7+2), anchor:'start'},
    {dx:-(r*0.7+p),dy:-(r*0.7+2), anchor:'end'},
    {dx:r*0.7+p,   dy:r*0.7+LH,   anchor:'start'},
    {dx:-(r*0.7+p),dy:r*0.7+LH,   anchor:'end'},
  ].map(c=>({...c, tx:px+c.dx, ty:py+c.dy, bbox:textBBox(px+c.dx,py+c.dy,c.anchor,w)}));
}

d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json').then(us=>{
  svg.append('g').selectAll('path')
    .data(topojson.feature(us,us.objects.states).features).join('path')
    .attr('fill',stFill).attr('stroke',stStr).attr('stroke-width',0.5).attr('d',geoPath);

  svg.append('path')
    .datum(topojson.mesh(us,us.objects.states,(a,b)=>a===b))
    .attr('fill','none').attr('stroke',outStr).attr('stroke-width',1.5).attr('d',geoPath);

  const valid=cities
    .filter(d=>proj([d.lng,d.lat])!==null)
    .map(d=>{ const [x,y]=proj([d.lng,d.lat]); return {...d,x,y,r:getR(d.pop)}; })
    .sort((a,b)=>b.pop-a.pop);

  svg.append('g').selectAll('circle').data(valid).join('circle')
    .attr('cx',d=>d.x).attr('cy',d=>d.y).attr('r',d=>d.r)
    .attr('fill',d=>COLORS[d.acp]).attr('fill-opacity',0.88)
    .attr('stroke',dark?'rgba(255,255,255,0.6)':'rgba(255,255,255,0.95)')
    .attr('stroke-width',1.2).style('cursor','pointer')
    .on('mouseover',function(ev,d){ d3.select(this).attr('stroke-width',3).attr('fill-opacity',1); showTip(ev,d); })
    .on('mousemove',(ev,d)=>showTip(ev,d))
    .on('mouseout',function(){ d3.select(this).attr('stroke-width',1.2).attr('fill-opacity',0.88); tip.style.display='none'; });

  const labeled=valid.filter(d=>d.pop>150000);
  const labG=svg.append('g');
  const placedBBoxes=[];

  labeled.forEach(d=>{
    const w=d.n.length*CH_W;
    const cands=candidates(d.x,d.y,d.r,w);
    const others=valid.filter(o=>o.n!==d.n);

    function score(cand){
      let s=0;
      others.forEach(o=>{ if(circleHitsRect(o.x,o.y,o.r,cand.bbox)) s+=10; });
      placedBBoxes.forEach(pb=>{
        const ox=Math.max(0,Math.min(cand.bbox.x2,pb.x2)-Math.max(cand.bbox.x1,pb.x1));
        const oy=Math.max(0,Math.min(cand.bbox.y2,pb.y2)-Math.max(cand.bbox.y1,pb.y1));
        if(ox>0&&oy>0) s+=5;
      });
      if(cand.bbox.x1<2||cand.bbox.x2>958||cand.bbox.y1<2||cand.bbox.y2>598) s+=20;
      return s;
    }

    const best=cands.reduce((a,b)=>score(a)<=score(b)?a:b);
    placedBBoxes.push(best.bbox);

    labG.append('text')
      .attr('x',best.tx).attr('y',best.ty).attr('text-anchor',best.anchor)
      .attr('font-size',10).attr('font-weight',500)
      .attr('fill',haloCol).attr('stroke',haloCol)
      .attr('stroke-width',3.5).attr('stroke-linejoin','round')
      .attr('paint-order','stroke').attr('pointer-events','none')
      .text(d.n);
    labG.append('text')
      .attr('x',best.tx).attr('y',best.ty).attr('text-anchor',best.anchor)
      .attr('font-size',10).attr('font-weight',500)
      .attr('fill',labelCol).attr('pointer-events','none')
      .text(d.n);
  });
});
