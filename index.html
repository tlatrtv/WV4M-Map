
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,sans-serif)}
#outer{padding:6px 0}
#ctrls{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.cl{font-size:11px;font-weight:500;color:var(--color-text-secondary)}
.cl+.cl{margin-left:8px}
.tog{font-size:11px;padding:4px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md,8px);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer}
.tog.on{background:var(--color-background-secondary);border-color:var(--color-border-primary);font-weight:500}
.tog:hover:not(.on){background:var(--color-background-secondary)}
#wrap{display:flex;gap:14px;align-items:flex-start}
#mh{flex:1;min-width:0;position:relative}
#msv{width:100%;border-radius:8px;display:block;cursor:default}
.tip{position:absolute;background:rgba(10,16,28,0.94);color:#fff;padding:8px 12px;border-radius:6px;font-size:11px;line-height:1.65;display:none;z-index:50;max-width:220px;white-space:nowrap;pointer-events:none}
.tip-pin{pointer-events:auto}
.tip-close{float:right;margin-left:10px;opacity:.6;cursor:pointer;font-size:13px;line-height:1}
.tip-close:hover{opacity:1}
#leg{width:204px;flex-shrink:0}
.ls{border:0.5px solid var(--color-border-tertiary);border-radius:8px;padding:10px 12px;margin-bottom:10px;background:var(--color-background-primary)}
.lt{font-size:10px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
.leg-acts{display:flex;gap:8px}
.lact{font-size:10px;color:var(--color-text-secondary);cursor:pointer;text-decoration:underline;text-underline-offset:2px}
.lact:hover{color:var(--color-text-primary)}
.chip{display:flex;align-items:center;gap:6px;padding:2px 4px;border-radius:4px;font-size:11px;color:var(--color-text-primary);cursor:pointer;user-select:none;transition:opacity .15s}
.chip.off{opacity:.3}
.chip:hover{background:var(--color-background-secondary)}
.cdot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,.2)}
@media(max-width:680px){#wrap{flex-direction:column}#leg{width:100%}}
</style>

<div id="outer">
  <div id="ctrls">
    <span class="cl">Labels:</span>
    <button class="tog on" id="b-key">Key cities</button>
    <button class="tog" id="b-all">All cities (&gt;100K)</button>
    <span class="cl">Dot size:</span>
    <button class="tog on" id="b-pop">By population</button>
    <button class="tog" id="b-uni">Uniform</button>
  </div>
  <div id="wrap">
    <div id="mh">
      <svg id="msv" viewBox="0 0 960 600"></svg>
      <div class="tip" id="tip"></div>
    </div>
    <div id="leg">
      <div class="ls">
        <div class="lt">
          <span>ACP community type</span>
          <span class="leg-acts">
            <span class="lact" id="sel-all">all</span>
            <span class="lact" id="sel-none">none</span>
          </span>
        </div>
        <div id="chips"></div>
      </div>
      <div class="ls">
        <div class="lt">Population (2020 census est.)</div>
        <svg id="szl" width="180" height="52"></svg>
        <div style="font-size:10px;color:var(--color-text-secondary);margin-top:4px">Click or tap a dot for details</div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
// ══════════════════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════════════════
const COLORS={

  ["Chandler","OK","Working Class Country",35.702,-96.8809,3100],
  ["Akron","OH","Working Class Country",41.0814,-81.519,190469],
  ["Monticello","AR","Working Class Country",33.6287,-91.7929,9600],
  ["Jackson","MS","African American South",32.2988,-90.1848,153701],
  ["Birmingham","AL","African American South",33.5186,-86.8104,212237],
  ["Goldsboro","NC","African American South",35.3849,-77.9925,34984],
  ["Baton Rouge","LA","African American South",30.4515,-91.1871,227470],
  ["San Antonio","TX","Hispanic Centers",29.4241,-98.4936,1434625],
  ["El Paso","TX","Hispanic Centers",31.7619,-106.485,678815],
  ["San Bernardino","CA","Hispanic Centers",34.1083,-117.2898,215000],
  ["Espanola","NM","Hispanic Centers",36.0003,-106.0714,10000],
  ["Henderson","TN","Evangelical Hubs",35.439,-88.6414,6200],
  ["London","KY","Evangelical Hubs",37.129,-84.0833,8100],
  ["Gallup","NM","Native American Lands",35.5281,-108.7426,22000],
  ["Nome","AK","Native American Lands",64.5011,-165.4064,3800],
  ["Marshalltown","IA","Rural Middle America",42.0494,-92.9082,27000],
  ["Watertown","SD","Rural Middle America",44.8994,-97.1148,22000],
  ["Emmett","ID","Rural Middle America",43.8727,-116.4996,6600],
  ["Harvey","ND","Aging Farmlands",47.7689,-99.9343,1800],
  ["Douglass","KS","Aging Farmlands",37.5167,-97.0072,1700],
  ["Salt Lake City","UT","LDS Enclaves",40.7608,-111.891,200567],
  ["Stone Harbor","NJ","Graying America",39.0523,-74.7596,866],
  ["Rupert","WV","Graying America",37.9565,-80.6895,800],
  ["Waterville","ME","Graying America",44.5523,-69.6317,16600],
  ["Montpelier","VT","Graying America",44.2601,-72.5754,7500],
  ["Dover","DE","Military Posts",39.1582,-75.5244,38079],
  ["Colorado Springs","CO","Military Posts",38.8339,-104.8214,478221]
];

// Curated key cities: geographically spread, one or two per ACP type
const KEY_SET=new Set([
  "New York City","Los Angeles","Chicago","Houston","Philadelphia","Washington",
  "Seattle","Las Vegas","Miami","Atlanta","Minneapolis",
  "San Antonio","El Paso","Baltimore","Honolulu","Colorado Springs",
  "Salt Lake City","Baton Rouge","Birmingham","Lincoln","Akron","Providence"
]);

// ══════════════════════════════════════════════════════
//  CONFIG & STATE
// ══════════════════════════════════════════════════════
const CFG={popCap:2e6,maxR:11,minR:6,uniformR:8,fs:10,lh:12,pad:5,vw:960,vh:600};
const state={
  activeTypes:new Set(Object.keys(COLORS)),
  allLabels:false,
  popSizing:true,
  pinnedCity:null
};

// ══════════════════════════════════════════════════════
//  SCALES & HELPERS
// ══════════════════════════════════════════════════════
const rSc=d3.scalePow().exponent(0.5).domain([0,CFG.popCap]).range([0,CFG.maxR]);
function getR(pop){return state.popSizing?Math.min(CFG.maxR,Math.max(CFG.minR,rSc(pop))):CFG.uniformR;}

const dark=matchMedia('(prefers-color-scheme: dark)').matches;
const mapBg=dark?'#1b2840':'#d4e6f1';
const stFill=dark?'#253650':'#eaf2f8';
const stStr=dark?'rgba(255,255,255,.14)':'#b8cfe0';
const outStr=dark?'rgba(255,255,255,.28)':'#88b4d0';
const labelCol=dark?'rgba(255,255,255,.92)':'rgba(0,0,0,.86)';
const haloCol=dark?'rgba(27,40,64,.97)':'rgba(230,240,248,.97)';
const connCol=dark?'rgba(255,255,255,.25)':'rgba(0,0,0,.22)';

// Project cities once; x/y never change
const svg=d3.select('#msv');
const proj=d3.geoAlbersUsa().scale(1180).translate([480,300]);
const geoPath=d3.geoPath().projection(proj);

const CITIES=RAW.map(([n,s,acp,lat,lng,pop])=>{
  const pt=proj([lng,lat]);
  return {n,s,acp,lat,lng,pop,x:pt?pt[0]:null,y:pt?pt[1]:null};
}).filter(d=>d.x!==null).sort((a,b)=>b.pop-a.pop);

// ══════════════════════════════════════════════════════
//  TEXT MEASUREMENT (real SVG measurement, not char est.)
// ══════════════════════════════════════════════════════
const _measCache={};
function measureW(text){
  if(_measCache[text]) return _measCache[text];
  const t=svg.append('text')
    .attr('font-size',CFG.fs).attr('font-weight',500)
    .attr('font-family','var(--font-sans,sans-serif)')
    .attr('visibility','hidden').text(text);
  const w=t.node().getComputedTextLength()||text.length*5.8;
  t.remove();
  _measCache[text]=w;
  return w;
}

// ══════════════════════════════════════════════════════
//  LABEL PLACEMENT (greedy 8-candidate with measured widths)
// ══════════════════════════════════════════════════════
function textBBox(tx,ty,anchor,w){
  const x1=anchor==='start'?tx:anchor==='end'?tx-w:tx-w/2;
  return {x1,y1:ty-CFG.lh,x2:x1+w,y2:ty+2};
}
function circleHitsRect(cx,cy,cr,b){
  const nx=Math.max(b.x1,Math.min(cx,b.x2)),ny=Math.max(b.y1,Math.min(cy,b.y2));
  const dx=cx-nx,dy=cy-ny;
  return dx*dx+dy*dy<(cr+1)*(cr+1);
}
function rectsOverlap(a,b){
  return !(a.x2<b.x1||b.x2<a.x1||a.y2<b.y1||b.y2<a.y1);
}

function computeLabelPlacements(toLabel,allVisible){
  const placed=[];
  toLabel.forEach(city=>{
    const w=measureW(city.n);
    const r=city.r,p=CFG.pad,lh=CFG.lh;
    const cands=[
      {tx:city.x+r+p,   ty:city.y+lh/3,       anchor:'start'},
      {tx:city.x-r-p,   ty:city.y+lh/3,       anchor:'end'},
      {tx:city.x,       ty:city.y-r-p,         anchor:'middle'},
      {tx:city.x,       ty:city.y+r+p+lh,      anchor:'middle'},
      {tx:city.x+r*.7+p,ty:city.y-r*.7,        anchor:'start'},
      {tx:city.x-r*.7-p,ty:city.y-r*.7,        anchor:'end'},
      {tx:city.x+r*.7+p,ty:city.y+r*.7+lh,     anchor:'start'},
      {tx:city.x-r*.7-p,ty:city.y+r*.7+lh,     anchor:'end'},
    ].map(c=>({...c,bbox:textBBox(c.tx,c.ty,c.anchor,w)}));

    let best=null,bestScore=Infinity;
    cands.forEach(cand=>{
      let s=0;
      const b=cand.bbox;
      if(b.x1<2||b.x2>CFG.vw-2||b.y1<2||b.y2>CFG.vh-2) s+=30;
      allVisible.forEach(dot=>{if(circleHitsRect(dot.x,dot.y,dot.r+1,b)) s+=12;});
      placed.forEach(pl=>{if(rectsOverlap(b,pl.bbox)) s+=9;});
      if(s<bestScore){bestScore=s;best=cand;}
    });
    if(best) placed.push({city,w,...best});
  });
  return placed;
}

// ══════════════════════════════════════════════════════
//  TOOLTIP
// ══════════════════════════════════════════════════════
const tipEl=document.getElementById('tip');
const holder=document.getElementById('mh');

function showTip(city,x,y,pinned){
  tipEl.style.display='block';
  tipEl.style.left=x+'px';
  tipEl.style.top=y+'px';
  if(pinned){
    tipEl.classList.add('tip-pin');
    tipEl.innerHTML=`<span class="tip-close" id="tip-x">✕</span><strong>${city.n}, ${city.s}</strong><br/><span style="color:#aaa">${city.acp}</span><br/>Pop: ${city.pop.toLocaleString()}`;
    document.getElementById('tip-x').onclick=()=>{state.pinnedCity=null;hideTip();};
  } else {
    tipEl.classList.remove('tip-pin');
    tipEl.innerHTML=`<strong>${city.n}, ${city.s}</strong><br/><span style="color:#aaa">${city.acp}</span><br/>Pop: ${city.pop.toLocaleString()}`;
  }
}

function posFromEvent(ev){
  const r=holder.getBoundingClientRect();
  let x=(ev.clientX??ev.touches?.[0]?.clientX??0)-r.left+14;
  let y=(ev.clientY??ev.touches?.[0]?.clientY??0)-r.top-48;
  if(x+220>r.width) x-=240;
  if(y<0) y+=60;
  return {x,y};
}

function posFromElement(el){
  const sr=document.getElementById('msv').getBoundingClientRect();
  const er=el.getBoundingClientRect();
  const r=holder.getBoundingClientRect();
  return {x:er.left-r.left+er.width/2+10, y:er.top-r.top-40};
}

function hideTip(){
  if(state.pinnedCity) return;
  tipEl.style.display='none';
}

// ══════════════════════════════════════════════════════
//  DRAW BASE MAP (static — only called once)
// ══════════════════════════════════════════════════════
function drawBaseMap(us){
  document.getElementById('msv').style.background=mapBg;
  svg.append('g').attr('class','states')
    .selectAll('path')
    .data(topojson.feature(us,us.objects.states).features).join('path')
    .attr('fill',stFill).attr('stroke',stStr).attr('stroke-width',.5).attr('d',geoPath);
  svg.append('path').attr('class','border')
    .datum(topojson.mesh(us,us.objects.states,(a,b)=>a===b))
    .attr('fill','none').attr('stroke',outStr).attr('stroke-width',1.5).attr('d',geoPath);
  // Layer groups (drawn once, content replaced by render())
  svg.append('g').attr('class','connectors-layer');
  svg.append('g').attr('class','points-layer');
  svg.append('g').attr('class','labels-layer');
}

// ══════════════════════════════════════════════════════
//  DRAW POINTS
// ══════════════════════════════════════════════════════
function drawPoints(){
  const visible=CITIES.filter(d=>state.activeTypes.has(d.acp)).map(d=>({...d,r:getR(d.pop)}));

  const g=svg.select('.points-layer');
  g.selectAll('circle').remove();

  g.selectAll('circle').data(visible,d=>d.n).join('circle')
    .attr('cx',d=>d.x).attr('cy',d=>d.y).attr('r',d=>d.r)
    .attr('fill',d=>COLORS[d.acp]).attr('fill-opacity',.88)
    .attr('stroke',dark?'rgba(255,255,255,.6)':'rgba(255,255,255,.92)')
    .attr('stroke-width',1.2)
    .attr('tabindex',0)
    .attr('role','button')
    .attr('aria-label',d=>`${d.n}, ${d.s}: ${d.acp}, population ${d.pop.toLocaleString()}`)
    .style('cursor','pointer')
    .on('mouseover',(ev,d)=>{
      if(state.pinnedCity) return;
      const {x,y}=posFromEvent(ev);
      showTip(d,x,y,false);
      d3.select(ev.currentTarget).attr('stroke-width',2.5).attr('fill-opacity',1);
    })
    .on('mousemove',(ev,d)=>{
      if(state.pinnedCity) return;
      const {x,y}=posFromEvent(ev);
      tipEl.style.left=x+'px'; tipEl.style.top=y+'px';
    })
    .on('mouseout',(ev)=>{
      if(!state.pinnedCity) hideTip();
      d3.select(ev.currentTarget).attr('stroke-width',1.2).attr('fill-opacity',.88);
    })
    .on('click',(ev,d)=>{
      ev.stopPropagation();
      if(state.pinnedCity===d){state.pinnedCity=null;hideTip();return;}
      state.pinnedCity=d;
      const {x,y}=posFromEvent(ev);
      showTip(d,x,y,true);
    })
    .on('touchstart',(ev,d)=>{
      ev.preventDefault();
      if(state.pinnedCity===d){state.pinnedCity=null;hideTip();return;}
      state.pinnedCity=d;
      const {x,y}=posFromEvent(ev);
      showTip(d,x,y,true);
    },{passive:false})
    .on('keydown',(ev,d)=>{
      if(ev.key==='Enter'||ev.key===' '){
        ev.preventDefault();
        if(state.pinnedCity===d){state.pinnedCity=null;hideTip();return;}
        state.pinnedCity=d;
        const {x,y}=posFromElement(ev.currentTarget);
        showTip(d,x,y,true);
      }
    })
    .on('focus',(ev,d)=>{
      if(state.pinnedCity) return;
      const {x,y}=posFromElement(ev.currentTarget);
      showTip(d,x,y,false);
    })
    .on('blur',()=>{ if(!state.pinnedCity) hideTip(); });

  return visible;
}

// ══════════════════════════════════════════════════════
//  DRAW LABELS
// ══════════════════════════════════════════════════════
function drawLabels(visible){
  svg.select('.connectors-layer').selectAll('*').remove();
  svg.select('.labels-layer').selectAll('*').remove();

  const threshold=state.allLabels?100000:0;
  const toLabel=visible.filter(d=>state.allLabels?d.pop>=threshold:KEY_SET.has(d.n));
  const placements=computeLabelPlacements(toLabel,visible);

  const cg=svg.select('.connectors-layer');
  const lg=svg.select('.labels-layer');

  placements.forEach(({city,tx,ty,anchor,w})=>{
    // Connector line
    const labelCx=anchor==='start'?tx+w/2:anchor==='end'?tx-w/2:tx;
    const labelCy=ty-CFG.lh/2;
    const dx=labelCx-city.x,dy=labelCy-city.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>city.r+8){
      const sx=city.x+dx/dist*city.r, sy=city.y+dy/dist*city.r;
      cg.append('line')
        .attr('x1',sx).attr('y1',sy).attr('x2',tx).attr('y2',ty-CFG.lh/3)
        .attr('stroke',connCol).attr('stroke-width',.8)
        .attr('pointer-events','none');
    }
    // Halo
    lg.append('text')
      .attr('x',tx).attr('y',ty).attr('text-anchor',anchor)
      .attr('font-size',CFG.fs).attr('font-weight',500)
      .attr('fill',haloCol).attr('stroke',haloCol)
      .attr('stroke-width',3.5).attr('stroke-linejoin','round')
      .attr('paint-order','stroke').attr('pointer-events','none')
      .text(city.n);
    // Label
    lg.append('text')
      .attr('x',tx).attr('y',ty).attr('text-anchor',anchor)
      .attr('font-size',CFG.fs).attr('font-weight',500)
      .attr('fill',labelCol).attr('pointer-events','none')
      .text(city.n);
  });
}

// ══════════════════════════════════════════════════════
//  DRAW LEGEND
// ══════════════════════════════════════════════════════
function drawLegend(){
  const chips=document.getElementById('chips');
  chips.innerHTML='';
  Object.entries(COLORS).forEach(([type,col])=>{
    const el=document.createElement('div');
    el.className='chip'+(state.activeTypes.has(type)?'':' off');
    el.dataset.type=type;
    el.innerHTML=`<div class="cdot" style="background:${col}"></div><span>${type}</span>`;
    el.onclick=()=>{
      if(state.activeTypes.has(type)) state.activeTypes.delete(type);
      else state.activeTypes.add(type);
      el.classList.toggle('off',!state.activeTypes.has(type));
      render();
    };
    chips.appendChild(el);
  });

  // Size legend
  const szSvg=d3.select('#szl');
  szSvg.selectAll('*').remove();
  const szData=[[5000,'5K'],[100000,'100K'],[500000,'500K'],[2000000,'2M+']];
  let xo=7;
  szData.forEach(([pop,lbl])=>{
    const r=getR(pop);
    szSvg.append('circle').attr('cx',xo+r).attr('cy',22).attr('r',r)
      .attr('fill','#888').attr('fill-opacity',.7)
      .attr('stroke',dark?'rgba(255,255,255,.4)':'rgba(255,255,255,.9)').attr('stroke-width',1);
    szSvg.append('text').attr('x',xo+r).attr('y',46).attr('text-anchor','middle')
      .attr('font-size',9).attr('fill',dark?'#aaa':'#666').text(lbl);
    xo+=r*2+12;
  });
}

// ══════════════════════════════════════════════════════
//  RENDER (redraws points + labels on state change)
// ══════════════════════════════════════════════════════
function render(){
  const visible=drawPoints();
  drawLabels(visible);
  drawLegend();
}

// ══════════════════════════════════════════════════════
//  CONTROL WIRING
// ══════════════════════════════════════════════════════
function attachControls(){
  function togPair(a,b,setState){
    document.getElementById(a).onclick=()=>{
      setState(false);
      document.getElementById(a).classList.add('on');
      document.getElementById(b).classList.remove('on');
      render();
    };
    document.getElementById(b).onclick=()=>{
      setState(true);
      document.getElementById(b).classList.add('on');
      document.getElementById(a).classList.remove('on');
      render();
    };
  }
  togPair('b-key','b-all',v=>state.allLabels=v);
  togPair('b-pop','b-uni',v=>{ state.popSizing=!v; });

  document.getElementById('sel-all').onclick=()=>{
    Object.keys(COLORS).forEach(t=>state.activeTypes.add(t));
    render();
  };
  document.getElementById('sel-none').onclick=()=>{
    state.activeTypes.clear();
    render();
  };

  // Click map background to unpin tooltip
  document.getElementById('msv').addEventListener('click',(ev)=>{
    if(ev.target.tagName==='circle') return;
    state.pinnedCity=null;
    hideTip();
  });
}

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json').then(us=>{
  drawBaseMap(us);
  attachControls();
  render();
});
</script>
